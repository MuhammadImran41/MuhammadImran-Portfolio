<section id="contact" style="padding:80px 0">
  <div class="wrap">
    <div class="rv" style="margin-bottom:48px;text-align:center;max-width:600px;margin-left:auto;margin-right:auto">
      <span class="slabel">// GET_IN_TOUCH</span>
      <h2 class="dh" style="font-size:clamp(2rem,4vw,3.5rem)">Let's <span class="gt">Connect</span></h2>
      <p style="color:#b0b0cc;margin-top:16px;line-height:1.7">Have a project in mind? Let's build something amazing together.</p>
    </div>
    
    <div class="gcard rv" style="max-width:600px;margin:0 auto;padding:40px">
      <form (ngSubmit)="onSubmit($event)" id="cform">
        <div style="display:grid;gap:20px">
          <div>
            <label style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#b0b0cc;display:block;margin-bottom:8px;letter-spacing:.1em">NAME</label>
            <input type="text" name="name" [(ngModel)]="formData.name" class="finput" placeholder="Your name" required />
          </div>
          <div>
            <label style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#b0b0cc;display:block;margin-bottom:8px;letter-spacing:.1em">EMAIL</label>
            <input type="email" name="email" [(ngModel)]="formData.email" class="finput" placeholder="your@email.com" required />
          </div>
          <div>
            <label style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#b0b0cc;display:block;margin-bottom:8px;letter-spacing:.1em">MESSAGE</label>
            <textarea name="message" [(ngModel)]="formData.message" class="finput" rows="5" placeholder="Tell me about your project..." required></textarea>
          </div>
          <button type="submit" class="btn btn-grad" style="width:100%;justify-content:center">{{buttonText}}</button>
        </div>
      </form>
    </div>

    <div class="rv" style="margin-top:48px;text-align:center">
      <p style="color:#b0b0cc;margin-bottom:16px">Or reach out directly:</p>
      <div style="display:flex;justify-content:center;gap:12px;flex-wrap:wrap">
        <a href="mailto:mimranofficial432&#64;gmail.com" class="btn btn-outline" style="display:inline-flex;gap:8px">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          mimranofficial432&#64;gmail.com
        </a>
        <a href="https://linkedin.com/in/muhammad-imran" target="_blank" class="btn btn-outline" style="display:inline-flex;gap:8px">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
          LinkedIn
        </a>
      </div>
    </div>
  </div>
</section>
